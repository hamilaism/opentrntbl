name: Lint

on:
  push:
  pull_request:

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck on firmware scripts
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './firmware'
          severity: warning

  python-lint:
    name: flake8
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install flake8
      - run: flake8 firmware/app.py
