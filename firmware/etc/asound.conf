# openTRNTBL — ALSA config
#
# 1. dsnoop_usb: shared capture from the BurrBrown PCM2900C USB ADC (hw:1,0).
#    Without this, hw:1,0 is exclusive — only one consumer at a time. We need
#    both Darkice (→ Icecast) and alsaloop (→ jack/RCA) reading at once.
#
# 2. boosted_jack: software volume boost on the sun4i-codec output. The on-chip
#    DAC of the C.H.I.P. (Allwinner R8) outputs a very low line level, far below
#    what the PAM8403 needs to drive the RCA / speakers loudly. Softvol gives
#    us up to +20dB before the PAM. Costs ~5-10% CPU.

pcm.dsnoop_usb {
    type dsnoop
    ipc_key 1024
    slave {
        pcm "hw:1,0"
        channels 2
        rate 48000
        format S16_LE
        period_size 1024
        buffer_size 4096
    }
}

pcm.boosted_jack {
    type route
    slave.pcm "plughw:0,0"
    ttable.0.0 64.0
    ttable.1.1 64.0
}
