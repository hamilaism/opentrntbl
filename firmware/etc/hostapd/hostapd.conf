# openTRNTBL AP mode (TRNTBL-Setup captive WiFi for initial setup)

interface=wlan0
driver=nl80211
ssid=TRNTBL-Setup
hw_mode=g
channel=6

# No WPA (open network — user then enters WiFi credentials on portal)
wpa=0
auth_algs=1

# No MAC filtering or hidden SSID
macaddr_acl=0
ignore_broadcast_ssid=0

# Power management — full TX power
tx_queue_len=5000
wmm_enabled=0
