# openTRNTBL AP mode (TRNTBL-Setup WiFi)
# Serves captive portal when user connects to AP before WiFi setup

# Bind to AP interface only
interface=wlan0

# DHCP range for connecting clients
dhcp-range=192.168.4.100,192.168.4.200,255.255.255.0,12h

# DNS wildcard: all domains resolve to AP IP (captive portal)
address=/#/192.168.4.1

# Explicitly serve captive portal URLs to iOS
# (iOS checks specific URLs to detect captive portal)
address=/captiveportal.apple.com/192.168.4.1
address=/www.apple.com/192.168.4.1

# Logging
log-queries
log-facility=/tmp/dnsmasq.log
